<!DOCTYPE html>
<html lang="az">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Register</title>
    <link rel="icon" href="https://freepngimg.com/save/36706-laptop-computer-icon/1600x1600" type="image/png">
    <link rel="stylesheet" href="./assets/computer.css">
</head>

<body>

    <div class="form-container">
        <h2>Computer Register</h2>

        <form>
            <div class="input-group">
                <label for="brand">Brand</label>
                <input type="text" id="brand" name="brand" placeholder="Enter the brand of your computer." required>
            </div>

            <div class="input-group">
                <label for="model">Model</label>
                <input type="text" id="model" name="model" placeholder="Enter your computer model." required>
            </div>
            <button type="submit">Qeydiyyatdan Keç</button>
        </form>
    </div>

</body>
