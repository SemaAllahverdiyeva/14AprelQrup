<!DOCTYPE html>
<html>

<head>

    <title>home</title>

    <style>
        body {
            font-family: Arial;
            background: #d9dee4;
            display: flex;
            justify-content: center;

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;

<body>

    <div class="card">
