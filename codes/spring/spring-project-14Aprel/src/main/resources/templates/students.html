<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>students</title>

    <style>
        body {
            font-family: Arial;
            background: #d9dee4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        h2 {
            text-align: center;
        }

        ol {
            padding-left: 20px;
            margin-bottom: 30px;
        }

        li {
            padding: 8px;
            margin: 5px 0;
            background: #f5f5f5;
            border-radius: 6px;
        }

          a {
            margin-top: 20px;
            padding: 10px 20px;
            background: #2196F3;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }


        a:hover {
            background: #1976D2;
        }
    </style>

</head>

<body>

    <div class="card">
        <h2>Students List</h2>

        <ol>
            <li>Sophie</li>
            <li>Felix</li>
            <li>Emily</li>
            <li>Mark</li>
            <li>Julia</li>
        </ol>

        <a href="/">Back Home</a>
    </div>

</body>

</html>
