<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Students</title>

    <style>

        body {
            font-family: Arial;
            background: #d9dee4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            width: 700px;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1976D2;
        }

        table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid gray;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

    </style>

</head>

<body>

<div class="card">

    <h2>Student Registration</h2>

    <form th:action="@{/addStudent}" th:object="${student}" method="post">

        <input type="text"
               th:field="*{name}"
               placeholder="Name">

        <input type="text"
               th:field="*{surname}"
               placeholder="Surname">

        <input type="number"
               th:field="*{age}"
               placeholder="Age">

        <button type="submit">Add Student</button>

    </form>

    <table>

        <tr>
            <th>Name</th>
            <th>Surname</th>
            <th>Age</th>
        </tr>

        <tr th:each="s : ${students}">
            <td th:text="${s.name}"></td>
            <td th:text="${s.surname}"></td>
            <td th:text="${s.age}"></td>
        </tr>

    </table>

</div>

</body>

</html>
